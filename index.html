<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCN v.8</title>
    <link rel="stylesheet" href="./style.css">
  </head>
    
  <body>
  <div class="container">

  <header class="masthead">
    <div class="system-line">
      <span>NIGHT CITY • SAT JUN 21 2045 • 02:17</span>
      <span>VER 0.8 ALPHA</span>
    </div>

    <h1>NIGHT CITY NEWS</h1>

    <p class="tagline">The Headlines of Tomorrow, Today</p>
  </header>

  <section class="command-bar">
    <button id="show-filters" class="command-button">Filters</button>
    <button id="show-submit" class="command-button transmit-command">+ Transmit</button>
  </section>

  <section id="mobile-drawer" class="mobile-drawer"></section>

  <main class="news-layout">
    <section id="feed" class="feed"></section>
    <aside id="inspector" class="inspector"></aside>
  </main>

</div>

<template id="filters-template">
  <section class="controls">

    <div class="filter-bar">
      <button class="filter-tab" data-panel="category-panel">Category</button>
      <button class="filter-tab" data-panel="area-panel">Area</button>
      <button class="filter-tab" data-panel="priority-panel">Priority</button>
      <button class="filter-tab" data-panel="source-panel">Source</button>
      <button class="filter-tab" data-panel="time-panel">Time</button>
    </div>

    <div class="filter-panels">

      <div id="category-panel" class="filter-panel">
        <button class="utility-btn" data-action="select-all" data-group="category">Select All</button>
        <button class="utility-btn" data-action="clear" data-group="category">Clear</button>
        <button class="filter-option active" data-group="category" data-value="Business">Business</button>
        <button class="filter-option active" data-group="category" data-value="Community">Community</button>
        <button class="filter-option active" data-group="category" data-value="Crime">Crime</button>
        <button class="filter-option active" data-group="category" data-value="Infrastructure">Infrastructure</button>
        <button class="filter-option active" data-group="category" data-value="Politics">Politics</button>
        <button class="filter-option active" data-group="category" data-value="Culture">Culture</button>
      </div>

      <div id="area-panel" class="filter-panel">
        <button class="utility-btn" data-action="select-all" data-group="area">Select All</button>
        <button class="utility-btn" data-action="clear" data-group="area">Clear</button>
        <button class="filter-option active" data-group="area" data-value="City Core">City Core</button>
        <button class="filter-option active" data-group="area" data-value="Urban Sprawl">Urban Sprawl</button>
        <button class="filter-option active" data-group="area" data-value="Industrial Fringe">Industrial Fringe</button>
        <button class="filter-option active" data-group="area" data-value="Private Enclave">Private Enclave</button>
        <button class="filter-option active" data-group="area" data-value="Frontier Zone">Frontier Zone</button>
      </div>

      <div id="priority-panel" class="filter-panel">
        <button class="utility-btn" data-action="select-all" data-group="priority">Select All</button>
        <button class="utility-btn" data-action="clear" data-group="priority">Clear</button>
        <button class="filter-option active" data-group="priority" data-value="Bulletin">Bulletin</button>
        <button class="filter-option active" data-group="priority" data-value="Advisory">Advisory</button>
        <button class="filter-option active" data-group="priority" data-value="Alert">Alert</button>
        <button class="filter-option active" data-group="priority" data-value="Warning">Warning</button>
        <button class="filter-option active" data-group="priority" data-value="Emergency">Emergency</button>
      </div>

      <div id="source-panel" class="filter-panel">
        <button class="utility-btn" data-action="select-all" data-group="sourceType">Select All</button>
        <button class="utility-btn" data-action="clear" data-group="sourceType">Clear</button>
        <button class="filter-option active" data-group="sourceType" data-value="Corporate">Corporate</button>
        <button class="filter-option active" data-group="sourceType" data-value="Civic Notice">Civic Notice</button>
        <button class="filter-option active" data-group="sourceType" data-value="Press Report">Press Report</button>
        <button class="filter-option active" data-group="sourceType" data-value="Eyewitness">Eyewitness</button>
        <button class="filter-option active" data-group="sourceType" data-value="Scanner Traffic">Scanner Traffic</button>
        <button class="filter-option active" data-group="sourceType" data-value="Anonymous Leak">Anonymous Leak</button>
        <button class="filter-option active" data-group="sourceType" data-value="Underground">Underground</button>
      </div>

      <div id="time-panel" class="filter-panel">
        <button class="time-option active" data-time="Now">Now</button>
        <button class="time-option" data-time="Last Day">Last Day</button>
        <button class="time-option" data-time="All Time">All Time</button>
      </div>

    </div>

    <input id="search" type="search" placeholder="Search headlines...">

  </section>
</template>

<template id="submit-template">
  <section class="submit-panel">
    <form id="submit-form" class="submit-form">

      <input id="submit-headline" type="text" placeholder="Headline" required>
      <textarea id="submit-body" placeholder="Body text (optional)"></textarea>

      <div class="form-grid">
        <select id="submit-category">
          <option>Business</option>
          <option>Community</option>
          <option>Crime</option>
          <option>Infrastructure</option>
          <option>Politics</option>
          <option>Culture</option>
        </select>

        <select id="submit-area">
          <option>City Core</option>
          <option>Urban Sprawl</option>
          <option>Industrial Fringe</option>
          <option>Private Enclave</option>
          <option>Frontier Zone</option>
        </select>

        <select id="submit-source-type">
          <option>Corporate</option>
          <option>Civic Notice</option>
          <option>Press Report</option>
          <option>Eyewitness</option>
          <option>Scanner Traffic</option>
          <option>Anonymous Leak</option>
          <option>Underground</option>
        </select>

        <select id="submit-priority">
          <option>Bulletin</option>
          <option>Advisory</option>
          <option>Alert</option>
          <option>Warning</option>
          <option>Emergency</option>
        </select>
      </div>

      <input
        id="submit-source"
        type="text"
        placeholder="Source (e.g. N54 Nightcast, Neon Prophet, Dockside Scanner)"
      >

      <button type="submit">Transmit</button>
      <div id="submit-message" class="submit-message"></div>

    </form>
  </section>
</template>

  </body>
  
</html>
